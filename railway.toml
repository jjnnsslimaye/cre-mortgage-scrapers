[build]
builder = "NIXPACKS"

[deploy]
startCommand = "echo 'Cron-only service, waiting for scheduled runs'"

[[crons]]
schedule = "55 2 * * *"
command = "cd florida/broward && python main.py --date $(python -c 'from datetime import datetime, timedelta; print((datetime.now() - timedelta(days=1)).strftime(\"%Y-%m-%d\"))') --upload-to-s3"
